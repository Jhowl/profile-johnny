<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Chat Admin · johnnycosta.dev</title>
  <style>
    :root {
      --bg: #101214;
      --card: #1A1A1A;
      --border: #2B2B2B;
      --orange: #FF7A1A;
      --text: #CCCCCC;
      --white: #FFFFFF;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, sans-serif;
      padding: 2rem;
      line-height: 1.5;
    }

    h1 { color: var(--white); font-size: 1.4rem; }
    h2 { color: var(--orange); font-size: 1.1rem; margin-top: 2.5rem; }

    .bar { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }

    input, button {
      font: inherit;
      padding: .55rem .8rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--white);
    }

    button { background: var(--orange); color: #fff; border-color: var(--orange); cursor: pointer; }
    input { min-width: 320px; }

    table { width: 100%; border-collapse: collapse; margin-top: .5rem; font-size: .85rem; }
    th, td { text-align: left; padding: .5rem .6rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { color: var(--orange); text-transform: uppercase; font-size: .7rem; letter-spacing: .05em; }

    .convo { border: 1px solid var(--border); border-radius: 6px; padding: 1rem; margin-bottom: 1rem; background: var(--card); }
    .convo .meta { color: #888; font-size: .75rem; margin-bottom: .75rem; }
    .msg { margin: .35rem 0; }
    .msg .role { color: var(--orange); font-weight: 600; text-transform: capitalize; }
    .empty { color: #777; }
    .error { color: #f44336; }
  </style>
</head>

<body>
  <h1>Chat Admin</h1>
  <div class="bar">
    <input id="token" type="password" placeholder="Admin token" autocomplete="off" />
    <button id="load">Load</button>
    <span id="status"></span>
  </div>

  <h2>Leads</h2>
  <div id="leads"><span class="empty">Enter your token and click Load.</span></div>

  <h2>Conversations</h2>
  <div id="conversations"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s ?? '').replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));

    // Remember the token locally so reloads are painless.
    $('token').value = localStorage.getItem('adminToken') || '';

    async function api(path, token) {
      const res = await fetch(`/api/admin/${path}?token=${encodeURIComponent(token)}`);
      if (!res.ok) throw new Error(res.status === 401 ? 'Unauthorized — wrong token.' : `Error ${res.status}`);
      return res.json();
    }

    async function load() {
      const token = $('token').value.trim();
      localStorage.setItem('adminToken', token);
      $('status').textContent = 'Loading…';
      $('status').className = '';
      try {
        const [{ leads }, { conversations }] = await Promise.all([
          api('leads', token),
          api('conversations', token),
        ]);
        renderLeads(leads);
        renderConversations(conversations);
        $('status').textContent = `${leads.length} leads · ${conversations.length} conversations`;
      } catch (err) {
        $('status').textContent = err.message;
        $('status').className = 'error';
      }
    }

    function renderLeads(leads) {
      if (!leads.length) { $('leads').innerHTML = '<span class="empty">No leads yet.</span>'; return; }
      const rows = leads.map((l) => `<tr>
        <td>${esc(l.created_at)}</td><td>${esc(l.name)}</td><td>${esc(l.email)}</td>
        <td>${esc(l.source)}</td><td>${esc(l.message)}</td></tr>`).join('');
      $('leads').innerHTML = `<table><thead><tr>
        <th>When</th><th>Name</th><th>Email</th><th>Source</th><th>Message</th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    function renderConversations(convos) {
      if (!convos.length) { $('conversations').innerHTML = '<span class="empty">No conversations yet.</span>'; return; }
      $('conversations').innerHTML = convos.map((c) => {
        const msgs = c.messages.map((m) =>
          `<div class="msg"><span class="role">${esc(m.role)}:</span> ${esc(m.content)}</div>`).join('');
        return `<div class="convo">
          <div class="meta">${esc(c.id)} · ${esc(c.created_at)} · ${esc(c.ip || '')} ${c.lead_captured ? '· ✅ lead' : ''}</div>
          ${msgs || '<span class="empty">No messages.</span>'}
        </div>`;
      }).join('');
    }

    $('load').addEventListener('click', load);
    $('token').addEventListener('keydown', (e) => { if (e.key === 'Enter') load(); });
    if ($('token').value) load();
  </script>
</body>

</html>
